version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wc-bet-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/wc_bet.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174
      - LOG_LEVEL=INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./preview
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    container_name: wc-bet-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
